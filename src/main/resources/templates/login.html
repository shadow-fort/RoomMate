<!doctype html>
<html lang="en">
<head th:replace="global/globalHeader.html :: headofhtml(title = 'RoomMate Login')"></head>
<body>

<div class="page-content-signUpIn d-flex align-items-center">
    <div class="container d-flex justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-7 col-xl-6 col-xxl-5">
            <div class="auth-card">
                <div class="logo-area">
                    <img class="logo-sidebar" src="../static/img/logo-RoomMate.png" th:src="@{img/logo-RoomMate.png}"
                         alt="logo RoomMate"/>
                    <div class="row margin-login">
                        <form th:action="@{/oauth2/authorization/github}" method="get">
                            <button type="submit" class="btn btn-info btn-outline-secondary my-btn">
                                <i class="fa-brands fa-github service-icon"></i> Login with Github
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
