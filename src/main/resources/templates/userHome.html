<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{global/globalHeader.html :: headofhtml(title = 'Home')}"></head>
<body>

<div class="page">

    <div class="sidebar">

        <div class="sidebar-header">
            <div class="sidebar-logo-container">
                <div class="logo-container">
                    <img class="logo-sidebar" src="../static/img/logo-RoomMate.png" th:src="@{/img/logo-RoomMate.png}"
                         alt="logo RoomMate"/>

                </div>
            </div>
        </div>

        <div class="sidebar-body">
            <ul class="navigation-list">
                <li class="navigation-list-item active">
                    <div class="row">
                        <a class="navigation-link" href="/userHome" th:href="@{/userHome}">
                            <i class="fa-solid fa-house"> </i> Home
                        </a>
                    </div>
                </li>
                <li class="navigation-list-item">
                    <a class="navigation-link" href="/userHome/userBooking" th:href="@{/userHome/userBooking}">My Bookings</a>
                </li>
                            <li class="navigation-list-item">
                                <div class="row">
                                    <a class="navigation-link" href="/userHome/userProfil" th:href="@{/userHome/userProfil}">
                                        <i class="m-1 fa-solid fa-person"></i> My Profil
                                    </a>
                                </div>
                            </li>
                <li class="margin mt-5">
                    <div class="row">
                        <form th:action="@{/logout}" method="post">
                            <input class="btn btn-outline-secondary my-btn btn-info" type="submit" value="Logout">
                        </form>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <div class="content row">
        <div class="container">
            <div class="row">
                <div class="col-sm-10">
                    <h1>
                        Hallo <span th:text="${user}">Max</span>!
                    </h1>
                </div>
                <div class="col-sm-2 mt-2" th:if="${userInf.contains('ROLE_ADMIN')}">
                    <form th:action="@{/adminHome}" method="get">
                        <button type="submit" class="btn btn-outline-secondary my-btn btn-info">
                            Admin View
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="body-content">

        <div class="container mt-3">
            <div class="container">
                <div class="row">
                    <div class="col-sm-10">
                        <h4>Rooms Overview</h4>
                    </div>
                    <div class="col-sm-2">
                        <button type="button" class="btn btn-outline-secondary my-btn btn-info"
                                onclick="togglePopupForSearching()">
                            search
                        </button>
                    </div>
                </div>
            </div>
            <hr>
            <div class="alert alert-danger" id="error-message" th:if="${error} != null" th:text="${error}">
                Some success message
            </div>
            <div class="alert alert-success" id="success-message" th:if="${success} != null" th:text="${success}">
                Some success message
            </div>
            <div id="datatable"></div>

            <table class="table table-striped" th:object="${rooms}">
                <thead>
                <tr>
                    <th>Room Name</th>
                    <th>Workplace</th>
                    <th>Details</th>
                </tr>
                </thead>
                <tbody th:remove="all-but-first">
                <tr th:each="room : ${rooms}">
                    <td th:text="${room.getRoomName()}">Doe</td>
                    <td th:text="${room.getNumbersWorkplaces()}">-</td>
                    <td>
                        <form method="get" th:action="@{/userHome/userRoomDetails}">
                            <input type="hidden" name="roomId" th:value="${room.getRoomId()}">
                            <button type="submit" class="btn btn-outline-secondary my-btn btn-info">Details</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="popup" id="popup-7">
    <div class="overlay"></div>
    <div class="content">
        <div class="close-btn" onclick="togglePopupForSearching()">&times;</div>
        <form th:action="@{/userHome/userHomeWithSearchCriteria}" th:object="${bookingsForm}" method="get">
            <h5>Search</h5>
            <div class="container">
                <div class="row">
                    <div class="col-sm-4 padding-left-3">
                        <div class="row mt-2 mb-3">
                            <label for="dateID">Date</label>
                            <input type="date" class="auth-input" placeholder=" " name="date"
                                   id="dateID" th:value="${date}" required>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="row mt-2 mb-3">
                            <label for="startTimeID">Start Time</label>
                            <input type="time" class="auth-input" name="startTime"
                                   id="startTimeID" th:value="${startTime}" required>
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="row mt-2 mb-3">
                            <label for="endTimeID">End Time</label>
                            <input type="time" class="auth-input" name="endTime"
                                   id="endTimeID" th:value="${endTime}" required>
                        </div>
                    </div>
                </div>
            </div>
            <h6>Choose a Description:</h6>
            <div class="row mb-3 p-3">
                <label>
                    <select class="form-select" id="descriptionID" name="selectedDescription">
                        <option value="" selected>Choose Workplace Description</option>
                        <option th:each="description : ${descriptions}" th:value="${description}"
                                th:text="${description}">
                        </option>
                    </select>
                </label>
            </div>
            <button type="submit" class="auth-btn mt-2 mb-3 my-btn btn-info" id="submitBtn">Submit</button>
        </form>
        <div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous">

</script>

</body>
</html>
