<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" th:href="@{css/bootstrap.min.css}"
          href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
          integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    <script src="../static/js/script.js"></script>
    <link rel="stylesheet" href="../static/css/all.min.css">
    <title>Room Details</title>
    <script src="../static/js/script.js"></script>
</head>
<body>
<div class="page-content-signUpIn d-flex align-items-center">
    <div class="container d-flex justify-content-center">
        <div class="col-20 col-sm-18 col-md-16 col-lg-14 col-xl-12 col-xxl-10">
            <div class="auth-card">
                <a href="userHome.html"><i class="fa-solid fa-circle-arrow-left arrow-back"></i></a>
                <h3 class="mt-5">Room ID Room Name</h3>
                <hr class="separator">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Workplace ID</th>
                        <th>Description Equipment</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr>
                        <td>1</td>
                        <td>
                            <p>
                                Monitop mit USB-C und 2 USB,
                                Tastatur mit Kabel
                            </p>
                        </td>
                        <td>
                            <button type="button" class="btn btn-outline-secondary my-btn"
                                    onclick="togglePopupForStatusCheking()">
                                check
                            </button>

                        </td>
                        <td>
                            <button type="button" class="btn btn-outline-secondary my-btn"
                                    onclick="togglePopupForBooking()">
                                Book
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>


                <div class="popup" id="popup-1">
                    <div class="overlay"></div>

                    <div class="content">
                        <div class="close-btn" onclick="togglePopupForBooking()">&times;</div>
                        <div class="container">
                            <div class="row">
                                <h5>Workplace ID</h5>
                                <div class="col-sm-6">
                                    <h5>New Booking</h5>
                                    <form action="">
                                        <div class="row mt-2 mb-3">
                                            <label for="dateID">Date</label>
                                            <input type="date" class="auth-input" placeholder="date" name="date"
                                                   id="dateID">
                                        </div>
                                        <div class="row mt-2 mb-3">
                                            <label for="startTimeID">Start Time</label>
                                            <input type="time" class="auth-input" name="startTime" id="startTimeID">
                                        </div>
                                        <div class="row mt-2 mb-3">
                                            <label for="endTimeID">End Time</label>
                                            <input type="time" class="auth-input" name="endTime" id="endTimeID">
                                        </div>
                                        <button type="submit" class="auth-btn mt-2 mb-3" id="submitBtn">Book</button>
                                    </form>
                                </div>

                                <div class="col-sm-6">
                                    <h5>Already Booked on: </h5>
                                    <div>
                                        <table class="table table-striped">
                                            <thead>
                                            <tr>
                                                <th>Date</th>
                                                <th>Start time</th>
                                                <th>End time</th>
                                            </tr>
                                            </thead>
                                            <tbody>
                                            <tr>
                                                <td>29.03.2023</td>
                                                <td>11:00</td>
                                                <td>17:00</td>
                                            </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="popup" id="popup-2">
            <div class="overlay"></div>
            <div class="content">
                <div class="close-btn" onclick="togglePopupForStatusCheking()">&times;</div>
                <h5>Workplace already reserved on: </h5>
                <div>
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>Date</th>
                            <th>Start time</th>
                            <th>End time</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td>29.03.2023</td>
                            <td>11:00</td>
                            <td>17:00</td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
