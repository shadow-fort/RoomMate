<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{global/globalHeader.html :: headofhtml(title = 'Rooms Overview')}"></head>
<body>
<div class="page-content-signUpIn d-flex align-items-center">
    <div class="container d-flex justify-content-center">
        <div class="col-20 col-sm-18 col-md-16 col-lg-14 col-xl-12 col-xxl-10">
            <div class="auth-card">
                <a href="/userHome" th:href="@{/userHome}"><i class="fa-solid fa-circle-arrow-left arrow-back p-2"></i></a>
                <div class="alert alert-danger" id="error-message" th:if="${error} != null" th:text="${error}">
                    Some error message
                </div>
                <div class="container">
                    <div class="row">
                        <div class="col-sm-10">
                            <h3>
                                <span th:text="${room.getRoomName()}">Name</span>
                            </h3>
                        </div>
                        <div class="col-sm-2 col-sm-2">
                            <button type="button" class="btn btn-outline-secondary my-btn btn-info"
                                    th:onclick="|togglePopupForSearching(${room.getRoomId()})|">
                                search
                            </button>
                        </div>
                    </div>
                </div>
                <div class="alert alert-success" id="success-message" th:if="${success} != null" th:text="${success}">
                    Some success message
                </div>
                <hr class="separator">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Workplace</th>
                        <th>Equipments</th>
                        <th>Status</th>
                        <th>Booking</th>
                    </tr>
                    </thead>
                    <tbody th:remove="all-but-first">

                    <tr th:each="selectedWorkplace : ${room.getWorkplaces()}">
                        <td th:text="${(selectedWorkplace.workplaceNummer())}">1</td>
                        <td th:text="${selectedWorkplace.equipments()}">

                        </td>
                        <td>
                            <form method="get" th:action="@{/userHome/userRoomDetails/workplaceStatus}" th:object="${roomForm}">
                                <input type="hidden" name="workplaceNumber" th:value="${selectedWorkplace.workplaceNummer()}">
                                <input type="hidden" name="workplaceStatus" th:value="${selectedWorkplace.status()}">
                                <input type="hidden" name="roomName" th:value="${room.getRoomName()}">
                                <input type="hidden" name="roomId" th:value="${room.getRoomId()}">
                                <button type="submit" class="btn btn-outline-secondary my-btn btn-info">Check</button>
                            </form>
                        </td>
                        <td>
                            <button type="button" class="btn btn-outline-secondary my-btn btn-info"
                                    th:onclick="|togglePopupForBooking(${selectedWorkplace.workplaceNummer()})|">
                                Book
                            </button>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div class="popup" id="popup-1">
                    <div class="overlay"></div>
                    <div class="content mt-3">
                        <div class="container">
                            <div class="row">
                                <h6>Workplace <span>ID</span></h6>
                                <div class="col-sm-12">
                                    <div class="close-btn mt-3" onclick="togglePopupForBooking()">&times;</div>
                                    <form method="post" th:action="@{/userHome/userRoomDetails}" th:object="${bookingsForm}">
                                        <input type="hidden" name="username" th:value="${user}">
                                        <input type="hidden" name="roomId" th:value="${room.getRoomId()}">
                                        <input type="hidden" name="bookingForWorkplace" id="selectedWorkplaceID"
                                               th:value="${bookingForWorkplace}">
                                        <div class="container">
                                            <div class="row">
                                                <div class="col-sm-4 padding-left-3">
                                                    <div class="row mt-2 mb-3">
                                                        <label for="dateID">Date</label>
                                                        <input type="date" class="auth-input" placeholder=" "
                                                               name="date"
                                                               id="dateID" th:value="${date}" required>
                                                    </div>
                                                </div>
                                                <div class="col-sm-4">
                                                    <div class="row mt-2 mb-3">
                                                        <label for="startTimeID">Start Time</label>
                                                        <input type="time" class="auth-input" name="startTime"
                                                               id="startTimeID" th:value="${startTime}">
                                                    </div>
                                                </div>
                                                <div class="col-sm-4">
                                                    <div class="row mt-2 mb-3">
                                                        <label for="endTimeID">End Time</label>
                                                        <input type="time" class="auth-input" name="endTime"
                                                               id="endTimeID" th:value="${endTime}" required>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="submit" class="auth-btn mt-2 mb-3 btn-info" id="submitBtn">Submit</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</div>

<div class="popup" id="popup-7">
    <div class="overlay"></div>
    <div class="content">
        <div class="close-btn" onclick="togglePopupForSearching()">&times;</div>
        <form th:action="@{/userHome/userRoomDetails}" method="get">
            <h5>Search</h5>
            <div class="container">
                <div class="row">
                    <input type="hidden" name="roomId" id="roomIDForSearching"  value="">
                    <div class="col-sm-4 padding-left-3">
                        <div class="row mt-2 mb-3">
                            <label for="dateI">Date</label>
                            <input type="date" class="auth-input" placeholder=" " name="date"
                                   id="dateI">
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="row mt-2 mb-3">
                            <label for="startTimeI">Start Time</label>
                            <input type="time" class="auth-input" name="startTime"
                                   id="startTimeI">
                        </div>
                    </div>
                    <div class="col-sm-4">
                        <div class="row mt-2 mb-3">
                            <label for="endTimeI">End Time</label>
                            <input type="time" class="auth-input" name="endTime"
                                   id="endTimeI">
                        </div>
                    </div>
                </div>
            </div>
            <h6>Choose a Description:</h6>
            <div class="row mb-3 p-3">
                <label>
                    <select class="form-select" id="descriptionID" name="selectedDescription">
                        <option value="" selected>Choose Workplace Description</option>
                        <option th:each="description : ${descriptions}" th:value="${description}"
                                th:text="${description}">
                        </option>
                    </select>
                </label>
            </div>
            <button type="submit" class="auth-btn mt-2 mb-3 my-btn btn-info" id="submitBt">Submit</button>
        </form>
        <div>

        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
