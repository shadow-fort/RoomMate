
<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/globalHeader :: headofhtml(title='Admin Home')}"></head>
<body>
<div class="page">

    <div class="sidebar">

        <div class="sidebar-header">
            <div class="sidebar-logo-container">
                <div class="logo-container">
                    <img class="logo-sidebar" src="/static/img/logo-RoomMate.png" th:src="@{../img/logo-RoomMate.png}" alt="logo RoomMate"/>
                </div>
            </div>
        </div>

        <div class="sidebar-body">
            <ul class="navigation-list">
                <li class="navigation-list-item active">
                    <div class="row">
                        <a class="navigation-link" href="adminHome.html" th:href="@{/adminHome}">
                            <i class="fa-solid fa-house"> </i> Home
                            <div class="col-10">
                            </div>
                        </a>
                    </div>
                </li>
                <li class="navigation-list-item">
                    <a class="navigation-link" href="adminBooking.html">Bookings</a>
                </li>
                <li class="navigation-list-item">
                    <div class="row">
                        <a class="navigation-link" href="adminViewUser.html">
                            <i class="m-1 fa-solid fa-user"></i> Users
                            <div class="col-10">
                            </div>
                        </a>
                    </div>
                </li>
                <li class="navigation-list-item">
                    <div class="row">
                        <a class="navigation-link" href="login.html">
                            Log out
                            <div class="col-10">
                            </div>
                        </a>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <div class="content row">
        <h3>Hallo Admin!</h3>
    </div>

</div>

<div class="body-content">

    <div class="container mt-3">
        <h4>Rooms Overview</h4>

        <!-- <p>The .table-striped class adds zebra-stripes to a table:</p> -->


        <button class="btn btn-info my-btn mt-2 mb-2" onclick="togglePopupForAddingNewRoom()">Add new Room</button>

        <div class="form-outline mb-4">
            <label class="form-label" for="datatable-search-input">Search</label>
            <input type="search" class="form-control search-input" id="datatable-search-input">
        </div>

        <div id="datatable"></div>

        <table class="table table-striped">
            <thead>
            <tr>
                <th>Room ID</th>
                <th>Room Name</th>
                <th>Status</th>
                <th>Number Workplace</th>
                <th>All Equipments in Room</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>1</td>
                <td>John</td>
                <td>Free</td>
                <td>4</td>
                <td><p>Monitor mit USB-C und 3USB,Tastatur mit Kabel</p></td>
                <td>
                    <button type="button" class="btn btn-outline-secondary my-btn" href="adminRoomDetails.html">
                        <a class="btn-outline-secondary my-btn" href="adminRoomDetails.html">Edit Room</a></button>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="container">
        <div class="popup" id="popup-4">
            <div class="overlay"></div>
            <div class="content">
                <div class="close-btn" onclick="togglePopupForAddingNewRoom()">&times;</div>
                <h5>Add New Room</h5>
                <div>
                    <form action="">
                        <div>
                            <label for="romeNameID" class="form-control border-0">Room Name</label>
                            <input type="text" class="form-control" name="roomName" id="romeNameID">
                        </div>
                        <div>
                            <label for="NumberWorkplaceID" class="form-control border-0">Number Workplace</label>
                            <input type="text" class="form-control" name="NumberWorkplace" id="NumberWorkplaceID">
                        </div>
                        <div>
                            <button type="submit" class="my-btn mt-3 mb-3">Add</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
