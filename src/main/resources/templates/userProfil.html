<!doctype html>
<html lang="en">
<head  th:replace="global/globalHeader.html :: headofhtml(title = 'My Profil')"> </head>
<body>
<div class="page">

    <div class="sidebar">

        <div class="sidebar-header">
            <div class="sidebar-logo-container">
                <div class="logo-container">
                    <img class="logo-sidebar" src="../static/img/logo-RoomMate.png" th:src="@{/img/logo-RoomMate.png}"
                         alt="logo RoomMate"/>
                </div>
            </div>
        </div>

        <div class="sidebar-body">
            <ul class="navigation-list">
                <li class="navigation-list-item">
                    <div class="row">
                        <a class="navigation-link" href="/userHome" th:href="@{/userHome}">
                            <i class="fa-solid fa-house"> </i> Home
                        </a>
                    </div>
                </li>
                <li class="navigation-list-item">
                    <a class="navigation-link" href="/userHome/userBooking" th:href="@{/userHome/userBooking}">
                        My Bookings</a>
                </li>
                <li class="navigation-list-item active">
                    <div class="row">
                        <a class="navigation-link" href="/userHome/userProfil" th:href="@{/userHome/userProfil}">
                            <i class="m-1 fa-solid fa-person"></i> My Profil
                        </a>
                    </div>
                </li>
                <li class="margin mt-5">
                    <div class="row">
                        <form th:action="@{/logout}" method="post">
                            <input class="btn btn-outline-secondary my-btn btn-info" type="submit" value="Logout">
                        </form>
                    </div>
                </li>
            </ul>
        </div>
    </div>

    <div class="content row">
        <h1>
            My Profil
        </h1>
    </div>

    <div class="body-content">

        <div class="container mt-3">
            <div class="page-content-signUpIn d-flex align-items-center">
                <div class="container d-flex justify-content-center">
                    <div class="col-12 col-sm-10 col-md-8 col-lg-7 col-xl-6 col-xxl-5">
                        <div >
                            <form th:action="@{/userHome/userProfil}" th:object="${userForm}" method="post">
                                <div class="mb-3 mt-0">
                                    <label for="titleID" class="mt-4">Title</label>
                                    <select name="title" id="titleID" class="form-select form-control auth-input" th:field="*{title}">
                                        <option value="" >Title</option>
                                        <option value="Prof.">Prof.</option>
                                        <option value="Dr.">Dr.</option>
                                        <option value="Prof. Dr.">Prof. Dr.</option>
                                    </select>
                                </div>
                                <div class="mt-4 mb-3">
                                    <label for="firstName">First Name</label>
                                    <input type="text" class="form-control auth-input" placeholder="First Name" id="firstName" th:field="*{firstName}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}">firstName Error</small>
                                </div>
                                <div class="mb-3 mt-0">
                                    <label for="surName">Surname</label>
                                    <input type="text" class="form-control auth-input" placeholder="Surname" id="surName" th:field="*{surName}">
                                    <small class="text-danger" th:if="${#fields.hasErrors('surName')}" th:errors="*{surName}">surName Error</small>
                                </div>

                                <button class="btn auth-btn mt-3 mb-2 btn-info"> Edit </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous">
</script>
</body>
</html>
