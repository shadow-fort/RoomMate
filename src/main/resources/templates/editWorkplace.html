<!doctype html>
<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head  th:replace="~{global/globalHeader.html :: headofhtml(title = 'Edit Workplace')}"> </head>
<body>
<div class="page-content-signUpIn d-flex align-items-center">
    <div class="container d-flex justify-content-center">
        <div class="col-20 col-sm-18 col-md-16 col-lg-14 col-xl-12 col-xxl-10">
            <div class="auth-card">
                <a href="/adminHome/adminRoomDetails" th:href="@{/adminHome/adminRoomDetails(roomId=${room.getRoomId()})}" ><i class="fa-solid fa-circle-arrow-left arrow-back"></i></a>
                <div class="alert alert-danger" id="error-message" th:if="${error} != null" th:text="${error}">
                    Some success message
                </div>
                <div class="container mt-5">
                    <div class="row">
                        <h3 class="col-sm-8">
                            Workplace: <span th:text="${workplaceNumber}" >Name</span>
                        </h3>
                    </div>
                </div>
                <div class="alert alert-success" id="success-message" th:if="${success} != null" th:text="${success}">
                    Some success message
                </div>
                <hr class="separator">
                <form th:action="@{/adminHome/adminRoomDetails/editWorkplace}" method="post" th:object="${roomForm}">
                    <div class="mb-3 mt-0">
                        <label for="equipments"> Equipments </label>
                        <input type="hidden" name="workplaceNumber" th:value="${workplaceNumber}">
                        <input type="hidden" name="workplaceStatus" th:value="${workplaceStatus}">
                        <input type="hidden" name="roomId" th:value="${room.getRoomId()}">
                        <input type="text" class="form-control auth-input" placeholder="Equipments"
                               id="equipments" th:value="${equipmentDescription}" name="equipmentDescription">
                        <button type="submit" class="auth-btn mt-2 mb-3 btn-info" id="submitBtn">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous">
</script>
</body>
</html>
