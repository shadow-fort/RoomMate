<!doctype html>
<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head  th:replace="~{global/globalHeader.html :: headofhtml(title = 'Status Workplace')}"> </head>
<body>
<div class="page-content-signUpIn d-flex align-items-center">
    <div class="container d-flex justify-content-center">
        <div class="col-20 col-sm-18 col-md-16 col-lg-14 col-xl-12 col-xxl-10">
            <div class="auth-card">
                <a href="/adminHome/adminRoomDetails" th:href="@{/adminHome/adminRoomDetails(roomId=${room.getRoomId()})}" >
                    <i class="fa-solid fa-circle-arrow-left arrow-back"></i></a>
                <h3 class="mt-5">
                    Workplace <span th:text="${workplaceNumber}" >Name</span> already reserved on:
                </h3>
                <hr class="separator">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Date</th>
                        <th>Start time</th>
                        <th>End time</th>
                    </tr>
                    </thead>
                    <tbody th:remove="all-but-first">
                    <tr th:each="booking : ${bookings}">
                        <td th:text="${booking.getDate()}">1</td>
                        <td th:text="${booking.getStartTime()}"></td>
                        <td th:text="${booking.getEndTime()}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous">
</script>
</body>
</html>
