<!doctype html>
<html lang="en">
<head th:replace="~{fragments/globalHeader :: headofhtml(title='Admin Home')}"> </head>
<body>


<div class="page">

    <div class="sidebar">

        <div th:replace="~{fragments/logo :: logo}"></div>

        <div th:replace="~{fragments/sidebarBody :: sidebarBody(bookings)}"></div>
    </div>

    <div class="content row">
        <h3>Hallo Admin!</h3>
    </div>

</div>

<div class="body-content">

    <div class="container mt-3">
        <h4>All Current Booking</h4>

        <!-- <p>The .table-striped class adds zebra-stripes to a table:</p> -->


        <div id="datatable"></div>

        <table class="table table-striped">
            <thead>
            <tr>
                <th>User Name</th>
                <th>Room Name</th>
                <th>Worplace ID</th>
                <th>Date</th>
                <th>Start Time</th>
                <th>End Time</th>
                <th>Update</th>
                <th>Delete</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>John</td>
                <th>Doe</th>
                <td>A</td>
                <td>29.03.2023</td>
                <td>11:00</td>
                <td>14:00</td>
                <td class><i class="fa-solid fa-pen-to-square" onclick="togglePopupForUpdatingBook()"></i></td>
                <td><i class="fa-solid fa-trash"></i></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<div class="popup" id="popup-3">
    <div class="overlay"></div>
    <div class="content">
        <div class="close-btn" onclick="togglePopupForUpdatingBook()">&times;</div>
        <h5>Update Booking </h5>
        <div class="container">
            <div class="row">
                <div class="col-sm-6">
                    <form action="">
                        <div class="row mt-2 mb-3">
                            <label for="dateID">Date</label>
                            <input type="date" class="auth-input" placeholder="date" name="date"
                                   id="dateID">
                        </div>
                        <div class="row mt-2 mb-3">
                            <label for="startTimeID">Start Time</label>
                            <input type="time" class="auth-input" name="startTime" id="startTimeID">
                        </div>
                        <div class="row mt-2 mb-3">
                            <label for="endTimeID">End Time</label>
                            <input type="time" class="auth-input" name="endTime" id="endTimeID">
                        </div>
                        <button type="submit" class="auth-btn mt-2 mb-3" id="submitBtn">Update</button>
                    </form>
                </div>

                <div class="col-sm-6">
                    <h6>My to update Booking </h6>
                    <div>
                        <table class="table table-striped">
                            <thead>
                            <tr>
                                <th>Date</th>
                                <th>Start time</th>
                                <th>End time</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td>29.03.2023</td>
                                <td>11:00</td>
                                <td>17:00</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</body>
</html>
